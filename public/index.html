<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrawSpark - AI Drawing Prompts for Kids</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #ff9a9e;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #ff6b6b;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 1.2em;
            color: #333;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ff9a9e;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1.3em;
            background: linear-gradient(135deg, #ff9a9e 0%, #ff6b6b 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .prompt-output {
            margin-top: 30px;
            padding: 25px;
            background: #fff5f5;
            border-radius: 15px;
            border: 3px solid #ff9a9e;
            display: none;
        }

        .prompt-output.show {
            display: block;
        }

        .prompt-title {
            font-size: 1.8em;
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .prompt-instruction {
            font-size: 1.4em;
            color: #333;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .prompt-tips {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ff9a9e;
            font-size: 1.1em;
            color: #666;
        }

        .prompt-tips strong {
            color: #ff6b6b;
            font-weight: bold;
        }

        .prompt-meta {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #ddd;
            font-size: 0.9em;
            color: #666;
        }

        .loading {
            text-align: center;
            font-size: 1.3em;
            color: #ff9a9e;
            margin-top: 20px;
        }

        .emoji {
            font-size: 1.5em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 DrawSpark</h1>
        <p class="subtitle">AI-Powered Drawing Prompts for Kids</p>

        <div class="form-group">
            <label for="age">Child's Age:</label>
            <input type="number" id="age" min="4" max="14" value="6" placeholder="4-14 years">
        </div>

        <div class="form-group">
            <label for="category">Drawing Category:</label>
            <select id="category">
                <option value="">Choose a category...</option>
                <option value="animals">🐰 Animals</option>
                <option value="nature">🌿 Nature</option>
                <option value="fantasy">🧚 Fantasy</option>
                <option value="space">🚀 Space</option>
                <option value="underwater">🌊 Underwater</option>
                <option value="food">🍕 Food</option>
                <option value="toys">🧸 Toys</option>
                <option value="family">👨 Family</option>
                <option value="sports">⚽ Sports</option>
                <option value="adventure">🏔️ Adventure</option>
                <option value="robots">🤖 Robots</option>
                <option value="dinosaurs">🦕 Dinosaurs</option>
                <option value="weather">🌤 Weather</option>
                <option value="school">📚 School</option>
                <option value="holidays">🎉 Holidays</option>
            </select>
        </div>

        <div class="form-group">
            <label for="difficulty">Difficulty Level:</label>
            <select id="difficulty">
                <option value="easy">Easy (Simple shapes)</option>
                <option value="medium" selected>Medium (Creative details)</option>
                <option value="hard">Hard (Complex artwork)</option>
            </select>
        </div>

        <button id="generateBtn" onclick="generatePrompt()">
            <span class="emoji">✏️</span> Generate Prompt
        </button>

        <div id="loading" class="loading" style="display: none;">
            Creating your drawing prompt... 🎨
        </div>

        <div id="promptOutput" class="prompt-output">
            <div id="promptTitle" class="prompt-title"></div>
            <div id="promptInstruction" class="prompt-instruction"></div>
            <div id="promptTips" class="prompt-tips"></div>
            <div id="promptMeta" class="prompt-meta"></div>
        </div>
    </div>

    <script>
        async function loadCategories() {
            try {
                const response = await fetch('/api/categories');
                const data = await response.json();

                const select = document.getElementById('category');
                data.categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function generatePrompt() {
            const age = document.getElementById('age').value;
            const category = document.getElementById('category').value;
            const difficulty = document.getElementById('difficulty').value;

            if (!age || !category) {
                alert('Please enter age and select a category');
                return;
            }

            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const output = document.getElementById('promptOutput');

            btn.disabled = true;
            loading.style.display = 'block';
            output.classList.remove('show');

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ age, category, difficulty })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to generate prompt');
                }

                const data = await response.json();

                document.getElementById('promptTitle').textContent = data.prompt.title;
                document.getElementById('promptInstruction').textContent = data.prompt.instruction;
                document.getElementById('promptTips').innerHTML = `<strong>💡 Tips:</strong> ${data.prompt.tips}`;
                document.getElementById('promptMeta').textContent =
                    `Category: ${data.category} | Age: ${data.age} | Difficulty: ${data.difficulty} | Generated: ${new Date(data.generatedAt).toLocaleString()}`;

                output.classList.add('show');

            } catch (error) {
                alert('Error: ' + error.message);
                console.error('Error:', error);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        // Load categories on page load
        loadCategories();
    </script>
</body>
</html>
